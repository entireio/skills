name: Skill improvement
description: Suggest an improvement to an existing skill
title: "[Skill improvement]: "
labels: ["enhancement"]
body:
  - type: input
    id: skill
    attributes:
      label: Which skill?
      placeholder: search, explain, what-happened, session-handoff, session-to-skill
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is confusing or missing?
    validations:
      required: true
  - type: textarea
    id: change
    attributes:
      label: What should change?
    validations:
      required: true
  - type: textarea
    id: example-prompt
    attributes:
      label: Example prompt
      render: text
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Add links, examples, or current behavior here.
